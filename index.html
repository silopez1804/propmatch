<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PropMatch</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f7f7f7;
      text-align: center;
    }

    textarea {
      width: 90%;
      height: 150px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>PropMatch</h1>
<p>Pega tu chat de WhatsApp</p>

<textarea id="chat"></textarea>
<br>
<button id="btn">Buscar Matches</button>

<div id="result"></div>

<script>
  document.getElementById("btn").addEventListener("click", async () => {

    const chat = document.getElementById("chat").value;

    if (!chat) {
      alert("Pega un texto primero");
      return;
    }

    document.getElementById("result").innerHTML = "Buscando...";

    try {
      const res = await fetch("/api/match", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ chat })
      });

      const data = await res.json();

      let html = `<h2>${data.encontrados} resultados</h2>`;

      data.matches.forEach(p => {

        html += `
          <div style="
            background:white;
            padding:15px;
            margin:15px 0;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
          ">

            <h3>${p["título de propiedad"] || "Sin título"}</h3>

            <p style="color:gray; font-size:14px;">
              Código: ${p["id público (EB)"] || "N/A"}
            </p>

            <p><strong>Precio:</strong> 
              ${p["precio de renta"] || p["precio de venta"] || "N/A"}
            </p>

            <p><strong>Zona:</strong> 
              ${p["colonia/zona/barrio"] || "N/A"}
            </p>

            <p>
              🛏 ${p["recámaras"] || 0} | 
              🛁 ${p["baños"] || 0} | 
              🚗 ${p["estacionamientos"] || 0}
            </p>

            <!-- BOTÓN VER FICHA -->
            <button onclick="navigator.clipboard.writeText('${p["id público (EB)"]}')"
  style="
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:black;
    color:white;
    border-radius:8px;
    border:none;
    cursor:pointer;
  ">
  Copiar código
</button>

            <!-- BOTÓN WHATSAPP -->
            <a href="https://wa.me/?text=${encodeURIComponent(
              `Te comparto esta propiedad:\n\n${p["título de propiedad"]}\nCódigo: ${p["id público (EB)"]}\nPrecio: ${p["precio de renta"] || p["precio de venta"]}\nhttps://www.easybroker.com/mx/listing/${p["clave interna"]}`
            )}"
            target="_blank"
            style="
              display:inline-block;
              margin-top:10px;
              margin-left:10px;
              padding:8px 12px;
              background:#25D366;
              color:white;
              border-radius:8px;
              text-decoration:none;
            ">
              WhatsApp
            </a>

          </div>
        `;
      });

      document.getElementById("result").innerHTML = html;

    } catch (err) {
      document.getElementById("result").innerHTML = "Error conectando";
      console.error(err);
    }
  });
</script>

</body>
</html>
