<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>PropMatch</title>
  <style>
    body {
      font-family: Arial;
      background: #f7f7f7;
      padding: 40px;
      text-align: center;
    }
    textarea {
      width: 90%;
      height: 200px;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>PropMatch</h1>
  <p>Pega tu chat de WhatsApp</p>

  <textarea id="chat"></textarea>

  <br>
  <button onclick="buscar()">Buscar Matches</button>

  <div id="result"></div>

  <script>
    async function buscar() {
      const chat = document.getElementById("chat").value;

      const res = await fetch("/api/match", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ chat })
      });

      const data = await res.json();

      document.getElementById("result").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }
  </script>

</body>
</html>
