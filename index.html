<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PropMatch</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f7f7f7;
      text-align: center;
    }

    textarea {
      width: 90%;
      height: 150px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      text-align: left;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>PropMatch</h1>
<p>Pega tu chat de WhatsApp</p>

<textarea id="chat"></textarea>
<br>
<button id="btn">Buscar Matches</button>

<div id="result"></div>

<script>
  document.getElementById("btn").addEventListener("click", async () => {

    const chat = document.getElementById("chat").value;

    if (!chat) {
      alert("Pega un texto primero");
      return;
    }

    document.getElementById("result").innerHTML = "Buscando...";

    try {
      const res = await fetch("/api/match", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ chat })
      });

      const data = await res.json();

      document.getElementById("result").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

    } catch (err) {
      document.getElementById("result").innerHTML = "Error conectando";
      console.error(err);
    }
  });
</script>

</body>
</html>
