<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PropMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
 
  <style>
    body {
  font-family: 'Montserrat', sans-serif;
  background: #a8a49a;
  padding: 40px;
  margin: 0;
  text-align: center;
}
h1, h3 {
  font-family: 'Playfair Display', serif;
}
    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      max-width: 600px;
      height: 120px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: #ff7a00;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #result {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      text-align: left;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    p {
      color: #555;
      font-size: 14px;
      margin: 5px 0;
    }

    .code {
      color: #999;
      font-size: 12px;
    }

    .buttons {
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      text-decoration: none;
      margin-right: 5px;
    }

    .btn-dark {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn-green {
      background: #25D366;
      color: white;
    }
  </style>
</head>

<body>
<div style="max-width:900px; margin:0 auto; text-align:left;">
  <img src="logo_ssprop.png" style="height:40px; margin-bottom:20px;">
</div>
<h1>PropMatch</h1>
<p>Pega tu chat de WhatsApp</p>

<textarea id="chat"></textarea>
<br>
<button id="btn">Buscar Matches</button>

<div id="result"></div>

<script>
  document.getElementById("btn").addEventListener("click", async () => {

    const chat = document.getElementById("chat").value;

    if (!chat) {
      alert("Pega un texto primero");
      return;
    }

    document.getElementById("result").innerHTML = "Buscando...";

    try {
      const res = await fetch("/api/match", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ chat })
      });

      const data = await res.json();

      let html = `<h2>${data.encontrados} resultados</h2>`;

      data.matches.forEach(p => {

        html += `
          <div class="card">

            <div class="code">
              ${p["id público (EB)"] || ""}
            </div>

            <h3>${p["título de propiedad"] || "Sin título"}</h3>

            <div class="price">
              ${p["precio de renta"] || p["precio de venta"] || "N/A"}
            </div>

            <p>
              📍 ${p["colonia/zona/barrio"] || ""}
            </p>

            <p>
              🛏 ${p["recámaras"] || 0} · 
              🛁 ${p["baños"] || 0} · 
              🚗 ${p["estacionamientos"] || 0}
            </p>

            <div class="buttons">

              <button class="btn btn-dark"
                onclick="navigator.clipboard.writeText('${p["id público (EB)"]}')">
                Copiar código
              </button>

              <a class="btn btn-green"
                href="https://wa.me/?text=${encodeURIComponent(
                  `Te comparto esta propiedad:\n\n${p["título de propiedad"]}\nCódigo: ${p["id público (EB)"]}\nPrecio: ${p["precio de renta"] || p["precio de venta"]}`
                )}"
                target="_blank">
                WhatsApp
              </a>

            </div>

          </div>
        `;
      });

      document.getElementById("result").innerHTML = html;

    } catch (err) {
      document.getElementById("result").innerHTML = "Error conectando";
      console.error(err);
    }
  });
</script>

</body>
</html>
