<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PropMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #a8a49a;
  padding: 40px;
  margin: 0;
  text-align: center;
}

h1, h3 {
  font-family: 'Playfair Display', serif;
}

/* BOTONES */
#modoBotones {
  margin: 30px 0;
}

#modoBotones button {
  margin: 0 12px;
  padding: 14px 32px;
  border-radius: 25px;
  border: none;
  background: #e5e5e5;
  color: #333;
  cursor: pointer;
  transition: 0.25s;
}

#modoBotones button.activo {
  background: #ff5a00;
  color: white;
}

/* INPUTS */
input, select {
  background: #f2f2f2;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin: 5px;
}

/* TEXTAREA */
.input-container {
  position: relative;
  width: 90%;
  max-width: 900px;
  margin: 30px auto;
}

textarea {
  width: 100%;
  height: 220px;
  padding: 20px;
  border-radius: 18px;
  border: none;
  background: #f2f2f2;
}

/* ICONO */
.sync-icon {
  position: absolute;
  right: 16px;
  top: 16px;
  width: 20px;
  padding: 8px;
  background: white;
  border-radius: 50%;
  cursor: pointer;
}

/* BOTÓN */
.main-btn {
  margin-top: 25px;
  padding: 16px 34px;
  background: #ff5a00;
  color: white;
  border-radius: 14px;
  border: none;
  cursor: pointer;
}

/* RESULTADOS */
#result {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 15px;
}

.price {
  font-weight: bold;
}
</style>
</head>

<body>

<img src="logo_ssprop.png" style="height:55px; margin-bottom:15px;">

<h1>PropMatch</h1>
<p style="color:#444;">Busca por cliente o pega un chat de WhatsApp</p>

<div id="modoBotones">
  <button id="btnCliente" onclick="cambiarModo('cliente')">Cliente</button>
  <button id="btnWhatsapp" onclick="cambiarModo('whatsapp')">WhatsApp</button>
</div>

<!-- CLIENTE -->
<div id="modoCliente">

  <input id="zona" placeholder="Zona (ej: Polanco)">
  <input id="recamarasInput" placeholder="Recámaras">
  <input id="presupuesto" placeholder="Presupuesto">

  <select id="operacion">
    <option value="">Operación</option>
    <option value="venta">Venta</option>
    <option value="renta">Renta</option>
  </select>

  <br>
  <button class="main-btn" onclick="buscarCliente()">Buscar por cliente</button>

</div>

<!-- WHATSAPP -->
<div id="modoWhatsapp">

  <div class="input-container">
    <textarea id="chat"></textarea>

    <img src="/sync.png"
         class="sync-icon"
         onclick="actualizarInventario()">
  </div>

  <p id="statusSync"></p>

  <button id="btn" class="main-btn">Buscar Matches</button>

</div>

<div id="result"></div>

<script>

function cambiarModo(modo) {
  const cliente = document.getElementById("modoCliente");
  const whatsapp = document.getElementById("modoWhatsapp");

  const btnC = document.getElementById("btnCliente");
  const btnW = document.getElementById("btnWhatsapp");

  btnC.classList.remove("activo");
  btnW.classList.remove("activo");

  if (modo === "cliente") {
    cliente.style.display = "block";
    whatsapp.style.display = "none";
    btnC.classList.add("activo");
  } else {
    cliente.style.display = "none";
    whatsapp.style.display = "block";
    btnW.classList.add("activo");
  }
}

cambiarModo("cliente");

// WHATSAPP
document.getElementById("btn").addEventListener("click", async () => {

  const chat = document.getElementById("chat").value;

  if (!chat) {
    alert("Pega un texto primero");
    return;
  }

  document.getElementById("result").innerHTML = "Buscando...";

  const res = await fetch("/api/match", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ chat })
  });

  const data = await res.json();
  pintarResultados(data);
});

// CLIENTE
async function buscarCliente() {

  const zona = document.getElementById("zona").value.toLowerCase();
  const recamaras = document.getElementById("recamarasInput").value;
  const presupuesto = document.getElementById("presupuesto").value;
  const operacion = document.getElementById("operacion").value;

  document.getElementById("result").innerHTML = "Buscando...";

  const res = await fetch("/api/match", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      modoManual: true,
      zona,
      recamaras,
      presupuesto,
      operacion
    })
  });

  const data = await res.json();
  pintarResultados(data);
}

// RESULTADOS
function pintarResultados(data) {

  let html = `<h2>${data.encontrados} resultados</h2>`;

  data.matches.forEach(p => {
    html += `
      <div class="card">
        <h3>${p["título de propiedad"] || "Sin título"}</h3>
        <div class="price">${p["precio de renta"] || p["precio de venta"] || "N/A"}</div>
        <p>📍 ${p["colonia/zona/barrio"] || ""}</p>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

// SYNC
async function actualizarInventario() {

  const status = document.getElementById("statusSync");
  status.innerText = "⏳ Actualizando...";

  try {
    const res = await fetch("/api/sync-easybroker");
    const data = await res.json();

    status.innerText = `✅ ${data.total} propiedades`;
  } catch {
    status.innerText = "❌ Error";
  }
}

</script>

</body>
</html>
