<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PropMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #a8a49a;
  padding: 40px;
  margin: 0;
  text-align: center;
}

h1, h3 {
  font-family: 'Playfair Display', serif;
}

textarea {
  width: 100%;
  height: 160px;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: #f2f2f2;
  font-size: 15px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
}

.input-container {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: auto;
}

/* 🔥 ICONO CON FONDO BLANCO */
.sync-icon {
  position: absolute;
  right: 12px;
  top: 12px;
  width: 18px;
  padding: 6px;
  background: white;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.85;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.sync-icon:hover {
  opacity: 1;
  transform: rotate(20deg);
}

button {
  margin-top: 25px;
  padding: 16px 34px;
  border: none;
  background: #ff5a00;
  color: white;
  border-radius: 14px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}

#result {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  text-align: left;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

.price {
  font-size: 22px;
  font-weight: bold;
  margin: 10px 0;
}

.code {
  color: #999;
  font-size: 12px;
}

.btn {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  margin-right: 5px;
}

.btn-dark {
  background: black;
  color: white;
  border: none;
}

.btn-green {
  background: #25D366;
  color: white;
}

#statusSync {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
}
</style>
</head>

<body>

<div style="max-width:900px; margin:0 auto; text-align:left;">
  <img src="logo_ssprop.png" style="height:55px; margin-bottom:15px;">
</div>

<h1>PropMatch</h1>
<p>Pega tu chat de WhatsApp</p>

<!-- 🔥 TEXTAREA + ICONO -->
<div class="input-container">
  <textarea id="chat"></textarea>

  <img src="TU-IMAGEN.png"
       class="sync-icon"
       onclick="actualizarInventario()">
</div>

<p id="statusSync"></p>

<button id="btn">Buscar Matches</button>

<div id="result"></div>

<script>
document.getElementById("btn").addEventListener("click", async () => {

  const chat = document.getElementById("chat").value;

  if (!chat) {
    alert("Pega un texto primero");
    return;
  }

  document.getElementById("result").innerHTML = "Buscando...";

  try {
    const res = await fetch("/api/match", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ chat })
    });

    const data = await res.json();

    let html = `<h2>${data.encontrados} resultados</h2>`;

    data.matches.forEach(p => {
      html += `
      <div class="card">
        <div class="code">${p["id público (EB)"] || ""}</div>
        <h3>${p["título de propiedad"] || "Sin título"}</h3>
        <div class="price">${p["precio de renta"] || p["precio de venta"] || "N/A"}</div>
        <p>📍 ${p["colonia/zona/barrio"] || ""}</p>
        <p>🛏 ${p["recámaras"] || 0} · 🛁 ${p["baños"] || 0} · 🚗 ${p["estacionamientos"] || 0}</p>

        <button class="btn btn-dark"
          onclick="navigator.clipboard.writeText('${p["id público (EB)"]}')">
          Copiar código
        </button>

        <a class="btn btn-green"
          href="https://wa.me/?text=${encodeURIComponent(
            `Te comparto esta propiedad:\n\n${p["título de propiedad"]}\nCódigo: ${p["id público (EB)"]}\nPrecio: ${p["precio de renta"] || p["precio de venta"]}`
          )}"
          target="_blank">
          WhatsApp
        </a>
      </div>
      `;
    });

    document.getElementById("result").innerHTML = html;

  } catch (err) {
    document.getElementById("result").innerHTML = "Error conectando";
  }
});

async function actualizarInventario() {
  const status = document.getElementById("statusSync");

  status.innerText = "⏳ Actualizando...";

  try {
    const res = await fetch("/api/sync-easybroker");
    const data = await res.json();

    status.innerText = `✅ ${data.total} propiedades actualizadas`;
  } catch (error) {
    status.innerText = "❌ Error";
  }
}
</script>

</body>
</html>
